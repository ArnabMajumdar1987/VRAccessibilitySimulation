<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accessibility Simulator VR</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a20; color:white; }

/* Tunnel overlay (desktop + VR) */
#tunnel-overlay {
  display:none;
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:10;
  background:radial-gradient(circle at center,
    transparent 25%,
    rgba(0,0,0,0.85) 65%,
    black 100%);
}
#tunnel-overlay.on { display:block; }

/* VR tunnel */
body.vr-tunnel::after {
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,
    transparent 25%,
    rgba(0,0,0,0.9) 70%);
  pointer-events:none;
  z-index:10;
}

/* VR ADHD shake */
body.vr-adhd #scene-wrap canvas {
  animation:shake 0.2s infinite;
}
@keyframes shake {
  0%{transform:translate(0,0)}
  50%{transform:translate(2px,-2px)}
  100%{transform:translate(0,0)}
}

button { padding:10px; margin:5px; }
</style>
</head>

<body>

<div id="tunnel-overlay"></div>

<button id="btn-desktop">Desktop Mode</button>
<button id="btn-vr">Enter VR</button>

<div id="demo"></div>

<a-scene id="scene-wrap" embedded>
  <a-box position="0 1 -3" color="purple"></a-box>
  <a-entity camera position="0 1.6 0"></a-entity>
</a-scene>

<script>
/* =========================
   CORE DATA
========================= */

const STATIONS = [
  {
    id:'memory',
    name:'Memory Impairment',
    demo:()=>`
      <div>
        <div id="memory-instructions">
          Remember: <strong>8392</strong>
        </div>
        <input placeholder="Enter code"/>
      </div>`
  },
  {
    id:'tunnel',
    name:'Tunnel Vision',
    demo:()=>`<p>Toggle simulation</p>`
  },
  {
    id:'adhd',
    name:'Attention Loss',
    demo:()=>`<input placeholder="Try typing"/>`
  }
];

let current = 0;
let adhdInterval = null;
let vrADHDInterval = null;

/* =========================
   RENDER
========================= */

function renderStation(i){
  current = i;
  const s = STATIONS[i];

  document.getElementById('demo').innerHTML = `
    <h2>${s.name}</h2>
    <label>
      <input type="checkbox" id="simToggle"> Enable Simulation
    </label>
    ${s.demo()}
  `;

  const chk = document.getElementById('simToggle');

  chk.addEventListener('change', e=>{
    const enabled = e.target.checked;

    /* CLEANUP */
    clearInterval(adhdInterval);
    clearInterval(vrADHDInterval);
    document.body.classList.remove('vr-tunnel','vr-adhd');
    document.getElementById('tunnel-overlay').classList.remove('on');

    /* MEMORY */
    if(s.id === 'memory'){
      const el = document.getElementById('memory-instructions');
      if(enabled){
        setTimeout(()=> el && (el.style.display='none'),3000);
      } else if(el){
        el.style.display='block';
      }
    }

    /* TUNNEL */
    if(s.id === 'tunnel'){
      document.getElementById('tunnel-overlay')
        .classList.toggle('on', enabled);
      document.body.classList.toggle('vr-tunnel', enabled);
    }

    /* ADHD */
    if(s.id === 'adhd'){
      if(enabled){
        adhdInterval = setInterval(()=>{
          const els = document.querySelectorAll('input,button');
          if(!els.length) return;
          els[Math.floor(Math.random()*els.length)].focus();
        },2500);

        document.body.classList.add('vr-adhd');

        vrADHDInterval = setInterval(()=>{
          const cam = document.querySelector('[camera]');
          if(!cam) return;
          cam.object3D.rotation.x += (Math.random()-0.5)*0.05;
          cam.object3D.rotation.y += (Math.random()-0.5)*0.05;
        },500);
      }
    }
  });
}

/* =========================
   NAVIGATION
========================= */

document.getElementById('btn-desktop').onclick = ()=>{
  renderStation(0);
};

/* =========================
   VR ENTRY FIX (IMPORTANT)
========================= */

document.getElementById('btn-vr').addEventListener('click', async ()=>{
  const scene = document.querySelector('a-scene');

  try{
    await scene.enterVR();
  } catch(e){
    console.error("VR failed:", e);
  }
});

/* INIT */
renderStation(0);

</script>

</body>
</html>
